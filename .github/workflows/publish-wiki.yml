name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "handoff/**"
      - "templates/**"
      - "ops/**"
      - "scripts/**"
      - "mkdocs.yml"
      - "requirements-wiki.txt"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-wiki.txt

      - name: Build wiki
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
