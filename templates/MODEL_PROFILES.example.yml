# Model profiles
#
# This file gives concrete starter profiles for the lab.
# Fill in the real model file names after download and testing.

profiles:
  fast_local:
    label: fast_local
    node: jetson-a
    model_family: Qwen2.5-1.5B-Instruct
    quantization: GGUF_Q4_K_M
    backend: llama.cpp
    backend_url: http://llamacpp:8080/v1
    model_file: /srv/labbrain/models/fast/EDIT_ME-qwen2.5-1.5b-instruct.gguf
    context_size: 2048
    max_tokens: 512
    compose_files:
      - compose/jetson-a-base.compose.yml
      - compose/jetson-a-fast.compose.yml

  code_local:
    label: code_local
    node: jetson-a
    model_family: Qwen2.5-Coder-3B-Instruct
