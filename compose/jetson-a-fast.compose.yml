# Jetson-A fast-model profile.
# Use this with compose/jetson-a-base.compose.yml.
#
# Suggested command:
#   docker compose -f compose/jetson-a-base.compose.yml -f compose/jetson-a-fast.compose.yml up -d

services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - LLAMA_ARG_MODEL=/models/fast/EDIT_ME-small-model.gguf
      - LLAMA_ARG_CTX_SIZE=2048
      - LLAMA_ARG_N_GPU_LAYERS=EDIT_ME
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
    volumes:
      - /srv/labbrain/models:/models
      - /srv/labbrain/data/llamacpp:/root/.cache
