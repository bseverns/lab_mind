# Jetson-A heavy-model profile.
# Use this with compose/jetson-a-base.compose.yml.
#
# Suggested command:
#   docker compose -f compose/jetson-a-base.compose.yml -f compose/jetson-a-heavy.compose.yml up -d
#
# This backend is compose-private only. Open WebUI reaches it on the internal network.

services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b8840
    restart: unless-stopped
    environment:
      - LLAMA_ARG_MODEL=/models/heavy/EDIT_ME-heavy-model.gguf
      - LLAMA_ARG_CTX_SIZE=8192
      - LLAMA_ARG_N_GPU_LAYERS=EDIT_ME
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
    volumes:
      - /srv/labbrain/models:/models
      - /srv/labbrain/data/llamacpp:/root/.cache
