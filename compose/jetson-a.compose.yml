services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /srv/labbrain/data/openwebui:/app/backend/data

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/labbrain/data/portainer:/data

  cockpit:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../dashboard:/usr/share/caddy:ro
