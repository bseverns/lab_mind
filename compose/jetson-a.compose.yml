# Legacy assistant-node example.
# Portainer and the durable spine services now belong on the R900.

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:git-f2a360c-cuda
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://llamacpp:8080/v1
      - OPENAI_API_KEY=none
    volumes:
      - /srv/labbrain/data/openwebui:/app/backend/data

  cockpit:
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../dashboard:/usr/share/caddy:ro
