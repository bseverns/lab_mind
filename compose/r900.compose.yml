# Canonical R900 spine example.
# Keep this as the home for durable room services.

services:
  portainer:
    image: portainer/portainer-ce:2.39.0
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/labbrain/data/portainer:/data

  nodered:
    image: nodered/node-red:4.1.8
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - /srv/labbrain/data/nodered:/data

  docs:
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /srv/labbrain/docs:/usr/share/caddy:ro
