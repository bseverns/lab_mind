# Legacy edge-support example.
# The docs mirror now belongs on the R900; keep this node for local helper work.

services:
  syncthing:
    image: syncthing/syncthing:2.0.16
    restart: unless-stopped
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    volumes:
      - /srv/labbrain/data/syncthing:/var/syncthing
