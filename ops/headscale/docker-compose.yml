services:
  headscale:
    image: ${HEADSCALE_IMAGE:-headscale/headscale:0.26.1}
    container_name: lab_brain_headscale
    restart: unless-stopped
    command: serve
    volumes:
      - ./config/config.yaml:/etc/headscale/config.yaml:ro
      - ./config/policy.hujson:/etc/headscale/policy.hujson:ro
      - ./data/lib:/var/lib/headscale
    ports:
      - "${HEADSCALE_METRICS_BIND:-127.0.0.1:9090}:9090"

  caddy:
    image: ${CADDY_IMAGE:-caddy:2.10.2}
    container_name: lab_brain_headscale_caddy
    restart: unless-stopped
    depends_on:
      - headscale
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
